name: CI - security and tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  checks: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: python
      - name: Autobuild (if needed)
        uses: github/codeql-action/autobuild@v2
      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v2

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run dependency review
        uses: github/dependency-review-action@v3

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt || true
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

# NOTE: No deploy job is configured. The workflow runs CodeQL, dependency review, and unit tests
# for both PRs to 'main' and pushes to 'main'. It intentionally does NOT perform any deployment.
